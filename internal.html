<!DOCTYPE html>
<html>
<head>
    <title>Internal CSS Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }
        h1 {
            color: darkred;
            text-align: center;
        }
        p {
            font-size: 18px;
            color: navy;
            margin: 20px;
        }
        button {
            background-color: green;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>WTMA Internal CSS</h1>
    <p>This content is styled using Internal CSS.</p>
    <button>Submit</button>

</body>
</html>
